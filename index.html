<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Cleaning Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 2rem;
        }

        .upload-section {
            text-align: center;
            padding: 2rem;
            border: 2px dashed #3498db;
            border-radius: 8px;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: #2980b9;
            background-color: #f7f9fc;
        }

        .upload-section label {
            display: block;
            margin-bottom: 1rem;
            color: #7f8c8d;
        }

        .options-section {
            margin-bottom: 2rem;
        }

        .option-group {
            margin-bottom: 1rem;
        }

        .checkbox-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .preview-section {
            margin-top: 2rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.8rem;
            text-align: left;
            border: 1px solid #ddd;
        }

        th {
            background-color: #f2f2f2;
        }

        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 5px;
            display: none;
        }

        .status.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Data Cleaning Interface</h1>
        
        <div class="upload-section">
            <label for="fileInput">Upload your CSV file</label>
            <input type="file" id="fileInput" accept=".csv" style="display: none;">
            <button onclick="document.getElementById('fileInput').click()">Choose File</button>
            <p id="fileName" style="margin-top: 1rem; color: #7f8c8d;">No file selected</p>
        </div>

        <div class="options-section">
            <h2>Cleaning Options</h2>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="dropDuplicates" checked>
                    <label for="dropDuplicates">Drop Duplicates</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="handleMissing" checked>
                    <label for="handleMissing">Handle Missing Values</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="convertTypes" checked>
                    <label for="convertTypes">Convert Data Types</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="standardizeColumns" checked>
                    <label for="standardizeColumns">Standardize Column Names</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="removeOutliers">
                    <label for="removeOutliers">Remove Outliers</label>
                </div>
            </div>
        </div>

        <button id="cleanData" disabled>Clean Data</button>
        <button id="downloadData" disabled>Download Cleaned Data</button>

        <div class="preview-section">
            <h2>Data Preview</h2>
            <div id="previewTable"></div>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
